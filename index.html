<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>顔面タップ ロシアンルーレット</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* CSSアニメーションの定義 */
    @keyframes flyAway {
      0% { transform: scale(1) translateY(0) rotate(0deg); opacity: 1; }
      40% { transform: scale(1.1) translateY(-10px) rotate(-10deg); opacity: 1; }
      100% { transform: scale(0.3) translateY(-300px) rotate(45deg); opacity: 0; }
    }
    .animate-fly {
      animation: flyAway 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }
    @keyframes flash {
      0%, 100% { background-color: #ef4444; }
      50% { background-color: #fca5a5; }
    }
    .animate-flash {
      animation: flash 1s infinite;
    }
  </style>
</head>
<body class="min-h-screen bg-gray-900 flex flex-col items-center justify-center font-sans overflow-hidden select-none">

  <audio id="lose-audio" preload="auto"></audio>

  <div id="start-screen" class="text-center p-6 bg-gray-800 rounded-2xl shadow-2xl max-w-sm w-full mx-4 border border-gray-700">
    <h1 class="text-3xl font-black text-white mb-6 tracking-wider">
      💣 顔面タップ<br/><span class="text-xl text-yellow-400">ロシアンルーレット</span>
    </h1>
    <p class="text-gray-400 mb-8 text-sm">
      1つだけハズレが隠れています。<br/>順番にタップして、ハズレを引いた人が負け！
    </p>
    <div class="space-y-4">
      <button onclick="startGame(16)" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold text-lg shadow-lg active:scale-95 transition-transform">
        16個 (4 × 4)
      </button>
      <button onclick="startGame(25)" class="w-full py-4 bg-green-600 hover:bg-green-500 text-white rounded-xl font-bold text-lg shadow-lg active:scale-95 transition-transform">
        25個 (5 × 5)
      </button>
      <button onclick="startGame(36)" class="w-full py-4 bg-purple-600 hover:bg-purple-500 text-white rounded-xl font-bold text-lg shadow-lg active:scale-95 transition-transform">
        36個 (6 × 6)
      </button>
    </div>
  </div>

  <div id="playing-screen" class="w-full max-w-md p-4 flex flex-col h-screen" style="display: none;">
    <div class="flex justify-between items-center mb-6 mt-4 px-2">
      <div class="text-white font-bold text-lg bg-gray-800 py-2 px-4 rounded-full">
        残りセーフ: <span id="safe-count" class="text-green-400 text-2xl">0</span> 個
      </div>
      <button onclick="resetGame()" class="text-gray-400 hover:text-white text-sm underline p-2">
        やめる
      </button>
    </div>

    <div class="flex-1 flex items-center justify-center">
      <div id="grid-container" style="display: grid; gap: 8px; width: 100%; aspect-ratio: 1 / 1;">
        </div>
    </div>
    <div class="h-20 text-center text-gray-500 text-sm flex items-center justify-center">
      順番に1つずつタップしてください👆
    </div>
  </div>

  <div id="result-screen" class="fixed inset-0 flex flex-col items-center justify-center z-50 p-6 animate-flash bg-black" style="display: none;">
    <img 
      id="lose-image"
      alt="lose" 
      class="absolute inset-0 w-full h-full object-contain z-0"
      onerror="this.style.display = 'none';"
    />
    
    <div class="relative z-10 flex flex-col items-center justify-between h-full w-full py-10">
      <h1 class="text-white text-5xl md:text-7xl font-black mt-4 animate-bounce text-center" style="text-shadow: 0 4px 8px rgba(0,0,0,0.8), 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000">
        アウト!!<br/>💥💥💥
      </h1>
      
      <button onclick="resetGame()" class="bg-white text-red-600 font-black py-4 px-10 rounded-full text-2xl shadow-[0_0_20px_rgba(255,255,255,0.8)] hover:scale-105 active:scale-95 transition-all mt-auto">
        もう一度遊ぶ
      </button>
    </div>
  </div>

  <script>
    // ⬇️ ここで画像のパスを設定 ⬇️
    const NORMAL_IMAGE_URL = "https://github.com/trazom-318/seiyu_alcoholGame/blob/main/src/seiyu_normal.PNG?raw=true";
    const LOSE_IMAGE_URL = "https://github.com/trazom-318/seiyu_alcoholGame/blob/main/src/seiyu_out.PNG?raw=true";
    const LOSE_AUDIO_URL = "https://github.com/trazom-318/seiyu_alcoholGame/blob/main/src/bfn.mp3#:~:text=Raw-,View%20raw,-(Sorry%20about%20that";
    
    // DOM要素の取得
    const audioEl = document.getElementById('lose-audio');
    const startScreen = document.getElementById('start-screen');
    const playingScreen = document.getElementById('playing-screen');
    const resultScreen = document.getElementById('result-screen');
    const gridContainer = document.getElementById('grid-container');
    const safeCountEl = document.getElementById('safe-count');
    const loseImageEl = document.getElementById('lose-image');

    // 初期設定
    audioEl.src = LOSE_AUDIO_URL;
    loseImageEl.src = LOSE_IMAGE_URL;

    // ゲームの状態管理変数
    let gameState = 'start'; // 'start', 'playing', 'result'
    let currentGridSize = 16;
    let bombIndex = -1;
    let clickedCells = [];

    // 表示する画面を切り替える関数
    function updateScreenVisibility() {
      startScreen.style.display = gameState === 'start' ? 'block' : 'none';
      playingScreen.style.display = gameState === 'playing' ? 'flex' : 'none';
      resultScreen.style.display = gameState === 'result' ? 'flex' : 'none';
    }

    // 残りセーフ数の更新
    function updateSafeCountDisplay() {
      const remaining = currentGridSize - clickedCells.length - 1;
      safeCountEl.textContent = remaining;
    }

    // ゲームスタート
    function startGame(size) {
      currentGridSize = size;
      clickedCells = [];
      bombIndex = Math.floor(Math.random() * size);
      gameState = 'playing';

      // グリッドの列数を計算して適用
      const cols = Math.sqrt(size);
      gridContainer.style.gridTemplateColumns = `repeat(${cols}, minmax(0, 1fr))`;
      
      // グリッドを生成
      gridContainer.innerHTML = '';
      for (let i = 0; i < size; i++) {
        const cell = document.createElement('div');
        cell.className = 'relative w-full aspect-square';
        
        const img = document.createElement('img');
        img.src = NORMAL_IMAGE_URL;
        img.alt = 'face';
        // 未タップ時のクラス
        img.className = 'w-full h-full object-cover shadow-md cursor-pointer active:scale-90 transition-transform';
        
        // タップイベント
        img.onclick = () => handleCellClick(i, img);
        
        cell.appendChild(img);
        gridContainer.appendChild(cell);
      }

      updateSafeCountDisplay();
      updateScreenVisibility();
    }

    // セルをタップしたときの処理
    function handleCellClick(index, imgEl) {
      if (gameState !== 'playing' || clickedCells.includes(index)) return;

      if (index === bombIndex) {
        // ハズレ
        gameState = 'result';
        updateScreenVisibility();
        
        // 音楽再生
        audioEl.currentTime = 0;
        audioEl.play().catch(err => console.log("再生がブロックされました:", err));
      } else {
        // セーフ
        clickedCells.push(index);
        updateSafeCountDisplay();
        
        // 飛んでいくアニメーションクラスに書き換え
        imgEl.className = 'w-full h-full object-cover shadow-md animate-fly absolute inset-0 pointer-events-none';
        imgEl.onclick = null; // クリック無効化
      }
    }

    // タイトルへ戻る
    function resetGame() {
      gameState = 'start';
      clickedCells = [];
      
      // 音楽停止
      audioEl.pause();
      audioEl.currentTime = 0;
      
      updateScreenVisibility();
    }
  </script>
</body>
</html>
